<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外資籌碼追蹤</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #242736; --border: #2e3347;
    --accent: #4f7fff;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --sidebar: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── Header ── */
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 11px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .search { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .search input[type=text] { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; width: 80px; }
  .search input[type=text]:focus { outline: none; border-color: var(--accent); }
  .search button { padding: 5px 12px; border-radius: 6px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .search button:hover { background: #3d6de8; }

  /* ── Layout ── */
  .app { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar { width: var(--sidebar); background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .sidebar-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; padding: 14px 14px 8px; }
  .stock-item { padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; }
  .stock-item:hover { background: var(--bg3); }
  .stock-item.active { border-left-color: var(--accent); background: rgba(79,127,255,.08); }
  .stock-item .sid { font-size: 13px; font-weight: 700; color: var(--text); }
  .stock-item .sname { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .stock-item.active .sid { color: var(--accent); }
  @media (max-width: 640px) { .sidebar { width: 100%; position: fixed; top: 0; left: 0; height: 100%; z-index: 50; transform: translateX(-100%); transition: transform .25s; } .sidebar.open { transform: translateX(0); } }

  /* ── Main content ── */
  .main { flex: 1; overflow-y: auto; padding: 16px; }
  @media (max-width: 640px) { .main { padding: 12px; } }

  /* ── Summary cards ── */
  .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  @media (max-width: 700px) { .summary-cards { grid-template-columns: repeat(2, 1fr); } }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .card .label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
  .card .value { font-size: 20px; font-weight: 700; }
  .card .sub   { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .up { color: var(--red); } .down { color: var(--green); }

  /* ── Date bar ── */
  .date-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .date-bar label { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .date-bar input[type=date] { padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 12px; color-scheme: dark; }
  .date-bar input[type=date]:focus { outline: none; border-color: var(--accent); }
  .presets { display: flex; gap: 5px; flex-wrap: wrap; }
  .preset-btn { padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .preset-btn:hover, .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .apply-btn { padding: 4px 11px; border-radius: 6px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .apply-btn:hover { background: #3d6de8; }
  .sep { color: var(--border); }

  /* ── Chart ── */
  .chart-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .chart-box h2 { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .06em; }
  .chart-wrap { position: relative; height: 280px; }
  @media (max-width: 640px) { .chart-wrap { height: 200px; } }

  /* ── Desktop table ── */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 30px; }
  table { width: 100%; border-collapse: collapse; background: var(--bg2); min-width: 600px; }
  thead { background: var(--bg3); position: sticky; top: 0; z-index: 1; }
  th, td { padding: 8px 12px; text-align: right; font-size: 12px; border-bottom: 1px solid var(--border); }
  th { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  th:first-child, td:first-child { text-align: left; }
  tbody tr:hover { background: var(--bg3); }
  .pos { color: var(--red); font-weight: 600; }
  .neg { color: var(--green); font-weight: 600; }
  /* 買超行：紅底 + 左色條 */
  tbody tr.row-buy  { background: rgba(239,68,68,0.07); box-shadow: inset 3px 0 0 rgba(239,68,68,0.65); }
  tbody tr.row-buy:hover  { background: rgba(239,68,68,0.13); }
  /* 賣超行：低飽和綠底 + 左色條 */
  tbody tr.row-sell { background: rgba(34,197,94,0.05); box-shadow: inset 3px 0 0 rgba(34,197,94,0.35); }
  tbody tr.row-sell:hover { background: rgba(34,197,94,0.10); }
  @media (max-width: 640px) { .table-wrap { display: none; } }

  /* ── Mobile cards ── */
  .mobile-cards { display: none; margin-bottom: 30px; }
  @media (max-width: 640px) { .mobile-cards { display: flex; flex-direction: column; gap: 8px; } }
  .mcard { background: var(--bg2); border: 1px solid var(--border); border-left-width: 3px; border-radius: 10px; padding: 12px 14px; }
  .mcard.buy-dom  { border-left-color: rgba(239,68,68,0.8);  background: rgba(239,68,68,0.06); }
  .mcard.sell-dom { border-left-color: rgba(34,197,94,0.4);  background: rgba(34,197,94,0.04); }
  .mcard-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .mcard-date { font-size: 13px; font-weight: 600; }
  .mcard-price { text-align: right; }
  .mcard-close { font-size: 16px; font-weight: 700; }
  .mcard-chg { font-size: 12px; margin-top: 1px; }
  .mcard-body { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .mcard-stat { background: var(--bg3); border-radius: 6px; padding: 7px 10px; }
  .mcard-stat .slabel { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
  .mcard-stat .sval { font-size: 14px; font-weight: 600; }
  .mcard-broker { margin-top: 8px; font-size: 11px; color: var(--text3); border-top: 1px solid var(--border); padding-top: 7px; }

  /* ── Mobile menu btn ── */
  .menu-btn { display: none; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; padding: 0 4px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 49; }
  @media (max-width: 640px) { .menu-btn { display: block; } .overlay.show { display: block; } }

  /* ── Broker ranking ── */
  .rank-toggle-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); font-size: 11px; padding: 4px 10px; cursor: pointer; margin-bottom: 8px; }
  .rank-toggle-btn:hover { color: var(--text2); border-color: var(--text3); }
  .rank-box { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .rank-box.open { display: grid; }
  @media (max-width: 640px) { .rank-box.open { grid-template-columns: 1fr; } }
  .rank-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .rank-panel h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .rank-panel.buy-panel h3 { color: rgba(239,68,68,0.85); }
  .rank-panel.sell-panel h3 { color: rgba(34,197,94,0.7); }
  .rank-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(46,51,71,0.5); font-size: 12px; }
  .rank-row:last-child { border-bottom: none; }
  .rank-no { font-size: 10px; color: var(--text3); width: 14px; flex-shrink: 0; }
  .rank-name { flex: 1; color: var(--text2); }
  .rank-buy  { color: rgba(239,68,68,0.85); font-weight: 600; text-align: right; }
  .rank-sell { color: rgba(34,197,94,0.65); font-weight: 600; text-align: right; }

  #status { text-align: center; color: var(--text3); padding: 60px 20px; line-height: 1.8; }
  #status code { background: var(--bg3); padding: 2px 8px; border-radius: 4px; font-size: 12px; color: var(--text2); }
</style>
</head>
<body>
<header>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>📊 外資籌碼追蹤</h1>
  <div class="search">
    <input id="stockInput" type="text" placeholder="代號" onkeydown="if(event.key==='Enter')loadStock(this.value)">
    <button onclick="loadStock(document.getElementById('stockInput').value)">查詢</button>
  </div>
</header>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">持股清單</div>
    <div id="stockList"></div>
  </div>
  <div class="main">
    <div id="status">載入中...</div>
    <div id="content" style="display:none">
      <div class="summary-cards">
        <div class="card"><div class="label">股票</div><div class="value" id="s-stock">—</div><div class="sub" id="s-range">—</div></div>
        <div class="card"><div class="label">最新收盤</div><div class="value" id="s-close">—</div><div class="sub" id="s-chg">—</div></div>
        <div class="card"><div class="label">期間外資累計淨買</div><div class="value" id="s-net">—</div><div class="sub">張</div></div>
        <div class="card"><div class="label">外資累計買均價</div><div class="value" id="s-avg">—</div><div class="sub">元 (VWAP)</div></div>
      </div>

      <div class="date-bar">
        <div class="presets">
          <button class="preset-btn" onclick="applyPreset(5,this)">近5日</button>
          <button class="preset-btn" onclick="applyPreset(10,this)">近10日</button>
          <button class="preset-btn" onclick="applyPreset(20,this)">近20日</button>
          <button class="preset-btn active" onclick="applyPreset(0,this)">全部</button>
        </div>
        <span class="sep">|</span>
        <label>從</label>
        <input type="date" id="dateFrom">
        <label>到</label>
        <input type="date" id="dateTo">
        <button class="apply-btn" onclick="applyDateRange()">套用</button>
      </div>

      <button class="rank-toggle-btn" id="rankToggle" onclick="toggleRank()">▶ 期間外資淨買賣排行</button>
      <div class="rank-box" id="rankBox">
        <div class="rank-panel buy-panel">
          <h3>買超前三（淨張）</h3>
          <div id="rankBuy"></div>
        </div>
        <div class="rank-panel sell-panel">
          <h3>賣超前三（淨張）</h3>
          <div id="rankSell"></div>
        </div>
      </div>

      <div class="chart-box">
        <h2>外資每日淨買張（柱）＋ 股價 & 累計買均價（線）</h2>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>日期</th><th>收盤</th><th>漲跌</th><th>當日淨買(張)</th><th>累計淨買(張)</th><th>當日買均價</th><th>累計買均價</th><th>最大買外資</th><th>最大賣外資</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="mobile-cards" id="mobileCards"></div>
    </div>
  </div>
</div>

<script>
let chart = null;
let fullData = null;
let currentId = null;

// ── Sidebar ──
function toggleRank() {
  const box = document.getElementById('rankBox');
  const btn = document.getElementById('rankToggle');
  const open = box.classList.toggle('open');
  btn.textContent = (open ? '▼' : '▶') + ' 期間外資淨買賣排行';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

async function loadIndex(preferStock) {
  try {
    const res = await fetch(`data/index.json?t=${Date.now()}`);
    if (!res.ok) return;
    const idx = await res.json();
    const list = document.getElementById('stockList');
    list.innerHTML = idx.stocks.map(s =>
      `<div class="stock-item" id="si-${s.id}" onclick="loadStock('${s.id}')">
        <div class="sid">${s.id}</div>
        <div class="sname">${s.name}</div>
      </div>`
    ).join('');
    // 優先載入 query string 指定的股票，否則第一支
    const target = preferStock || (idx.stocks[0]?.id);
    if (target) loadStock(target);
  } catch(e) { /* index.json 不存在也 ok */ }
}

function setActiveSidebarItem(id) {
  document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`si-${id}`);
  if (el) el.classList.add('active');
}

// ── Load stock ──
async function loadStock(sid) {
  sid = (sid || '').trim();
  if (!sid) return;
  currentId = sid;
  document.getElementById('stockInput').value = sid;
  setActiveSidebarItem(sid);
  history.replaceState(null, '', `?stock=${sid}`);
  // 手機關閉 sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');

  const statusEl = document.getElementById('status');
  statusEl.style.display = 'block';
  statusEl.innerHTML = '載入中...';
  document.getElementById('content').style.display = 'none';
  try {
    const res = await fetch(`data/${sid}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`找不到 data/${sid}.json<br>請執行：<code>node fetch_chip.js ${sid}</code>`);
    fullData = await res.json();
    const allDates = getAllDates(fullData);
    document.getElementById('dateFrom').value = allDates[0];
    document.getElementById('dateTo').value   = allDates[allDates.length - 1];
    document.getElementById('dateTo').max     = allDates[allDates.length - 1];
    document.getElementById('dateFrom').min   = allDates[0];
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.preset-btn:last-of-type').classList.add('active');
    renderView(allDates[0], allDates[allDates.length - 1]);
    statusEl.style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    statusEl.innerHTML = e.message;
  }
}

function getAllDates(data) {
  return [...new Set([...data.prices.map(p=>p.date), ...data.chips.map(c=>c.date)])].sort();
}

function setActivePreset(btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function applyPreset(n, btn) {
  setActivePreset(btn);
  const allDates = getAllDates(fullData);
  const filtered = n > 0 ? allDates.slice(-n) : allDates;
  document.getElementById('dateFrom').value = filtered[0];
  document.getElementById('dateTo').value   = filtered[filtered.length - 1];
  renderView(filtered[0], filtered[filtered.length - 1]);
}

function applyDateRange() {
  setActivePreset(null);
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  if (from && to) renderView(from, to);
}

function renderView(fromDate, toDate) {
  const { stockId, prices, chips } = fullData;

  const priceMap = {}, chipMap = {};
  prices.forEach(p => priceMap[p.date] = p);
  chips.forEach(c  => chipMap[c.date]  = c);

  const allDates = getAllDates(fullData);
  const dates = allDates.filter(d => d >= fromDate && d <= toDate);
  if (!dates.length) return;

  // ── Summary cards ──
  document.getElementById('s-stock').textContent = stockId;
  document.getElementById('s-range').textContent = `${dates[0]} ～ ${dates[dates.length-1]}`;

  const lastPrice = [...dates].reverse().map(d => priceMap[d]).find(Boolean);
  const prevPrice = lastPrice ? (() => {
    const idx = allDates.indexOf(lastPrice.date);
    return idx > 0 ? priceMap[allDates[idx-1]] : null;
  })() : null;
  document.getElementById('s-close').textContent = lastPrice?.close ?? '—';
  if (lastPrice && prevPrice) {
    const chg = (lastPrice.close - prevPrice.close).toFixed(2);
    const pct = ((lastPrice.close - prevPrice.close) / prevPrice.close * 100).toFixed(2);
    const el = document.getElementById('s-chg');
    el.textContent = `${chg >= 0 ? '+' : ''}${chg} (${pct}%)`;
    el.className = 'sub ' + (chg >= 0 ? 'up' : 'down');
  }

  const filteredChips = dates.map(d => chipMap[d]).filter(Boolean);
  const totalNet = filteredChips.reduce((s, c) => s + c.foreign_net, 0);
  document.getElementById('s-net').textContent = (totalNet >= 0 ? '+' : '') + totalNet;
  document.getElementById('s-net').className = 'value ' + (totalNet >= 0 ? 'up' : 'down');

  let totalBuyAmt = 0, totalBuyVol = 0;
  filteredChips.forEach(c => { totalBuyAmt += c.foreign_buy_avg * c.foreign_buy * 1000; totalBuyVol += c.foreign_buy * 1000; });
  document.getElementById('s-avg').textContent = totalBuyVol ? (totalBuyAmt / totalBuyVol).toFixed(2) : '—';

  // ── Chart data ──
  const closeArr  = dates.map(d => priceMap[d]?.close ?? null);
  const netArr    = dates.map(d => chipMap[d]?.foreign_net ?? null);
  let cum = 0;
  const cumArr = dates.map(d => { cum += chipMap[d]?.foreign_net ?? 0; return cum; });
  let cba = 0, cbv = 0;
  const cumBuyAvgArr = dates.map(d => {
    const c = chipMap[d];
    if (c && c.foreign_buy > 0) { cba += c.foreign_buy_avg * c.foreign_buy; cbv += c.foreign_buy; }
    return cbv > 0 ? +(cba / cbv).toFixed(2) : null;
  });

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mainChart'), {
    data: {
      labels: dates,
      datasets: [
        { type:'bar', label:'當日淨買(張)', data:netArr,
          backgroundColor: netArr.map(v => v >= 0 ? 'rgba(239,68,68,0.7)' : 'rgba(34,197,94,0.7)'),
          yAxisID:'yNet', order:2 },
        { type:'line', label:'累計淨買(張)', data:cumArr,
          borderColor:'#a78bfa', backgroundColor:'transparent',
          borderWidth:1.5, borderDash:[3,3], pointRadius:0, yAxisID:'yNet', order:3, tension:0.1 },
        { type:'line', label:'收盤價', data:closeArr,
          borderColor:'#4f7fff', backgroundColor:'transparent',
          borderWidth:2.5, pointRadius:3, yAxisID:'yPrice', order:1, tension:0.1 },
        { type:'line', label:'累計買均價', data:cumBuyAvgArr,
          borderColor:'#f59e0b', backgroundColor:'transparent',
          borderWidth:2, borderDash:[5,4], pointRadius:2, yAxisID:'yPrice', order:0, tension:0.1 },
      ],
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        tooltip:{
          backgroundColor:'rgba(26,29,39,0.95)', borderColor:'#2e3347', borderWidth:1,
          callbacks:{
            afterBody(ctx) {
              const date = ctx[0]?.label;
              const c = chipMap[date];
              if (!c?.top_foreign?.length && !c?.top_foreign_sellers?.length) return [];
              const lines = [];
              if (c.top_foreign?.length) {
                lines.push('','── 買超外資 ──');
                c.top_foreign.slice(0,3).forEach(f => lines.push(`${f.name}  +${f.net}張  均${f.buy_avg}`));
              }
              if (c.top_foreign_sellers?.length) {
                lines.push('','── 賣超外資 ──');
                c.top_foreign_sellers.slice(0,3).forEach(f => lines.push(`${f.name}  ${f.net}張  均${f.sell_avg}`));
              }
              return lines;
            }
          }
        },
        legend:{ position:'top', labels:{ color:'#94a3b8', boxWidth:14 } },
      },
      scales:{
        yNet:  { position:'left',  title:{display:true,text:'淨買張數',color:'#64748b'}, grid:{color:'rgba(46,51,71,0.8)'}, ticks:{color:'#64748b'} },
        yPrice:{ position:'right', title:{display:true,text:'價格(元)',color:'#64748b'}, grid:{drawOnChartArea:false}, ticks:{color:'#64748b'} },
        x:     { ticks:{color:'#64748b',maxRotation:45}, grid:{color:'rgba(46,51,71,0.5)'} },
      },
    },
  });

  // ── Table & cards ──
  // ── 跨日外資分點買賣加總排行 ──
  const brokerTotals = {};
  for (const d of dates) {
    const c = chipMap[d];
    if (!c) continue;
    for (const f of [...(c.top_foreign || []), ...(c.top_foreign_sellers || [])]) {
      if (!brokerTotals[f.name]) brokerTotals[f.name] = { buy: 0, sell: 0 };
      brokerTotals[f.name].buy  += f.buy  || 0;
      brokerTotals[f.name].sell += f.sell || 0;
    }
  }
  const brokerArr = Object.entries(brokerTotals).map(([name, v]) => ({
    name, net: v.buy - v.sell,
  }));
  const top3Buy  = [...brokerArr].sort((a,b) => b.net - a.net).filter(r => r.net > 0).slice(0, 3);
  const top3Sell = [...brokerArr].sort((a,b) => a.net - b.net).filter(r => r.net < 0).slice(0, 3);

  const rankRow = (r, i, cls) => `
    <div class="rank-row">
      <span class="rank-no">${i+1}</span>
      <span class="rank-name">${r.name}</span>
      <span class="${cls}">${r.net >= 0 ? '+' : ''}${r.net.toLocaleString()}張</span>
    </div>`;

  document.getElementById('rankBuy').innerHTML  = top3Buy.map((r,i)  => rankRow(r,i,'rank-buy')).join('') || '<div style="color:var(--text3);font-size:12px;padding:6px 0">無買超資料</div>';
  document.getElementById('rankSell').innerHTML = top3Sell.map((r,i) => rankRow(r,i,'rank-sell')).join('') || '<div style="color:var(--text3);font-size:12px;padding:6px 0">無賣超資料</div>';

  // Super dominant 閾值：淨買絕對值前 20%
  const netVals  = dates.map(d => chipMap[d]?.foreign_net ?? 0);
  const sorted20 = [...netVals].map(Math.abs).filter(v=>v>0).sort((a,b)=>b-a);
  const threshold = sorted20[Math.floor(sorted20.length * 0.2)] ?? Infinity;
  const superBuy  = v => v > 0 && v >= threshold;
  const superSell = v => v < 0 && Math.abs(v) >= threshold;

  const cumMap = {}, cumBuyAvgMap = {};
  let rs = 0, rba = 0, rbv = 0;
  dates.forEach(d => {
    rs += chipMap[d]?.foreign_net ?? 0; cumMap[d] = rs;
    const c = chipMap[d];
    if (c && c.foreign_buy > 0) { rba += c.foreign_buy_avg * c.foreign_buy; rbv += c.foreign_buy; }
    cumBuyAvgMap[d] = rbv > 0 ? (rba / rbv).toFixed(2) : null;
  });

  const rows = [...dates].reverse();

  document.getElementById('tableBody').innerHTML = rows.map(date => {
    const p = priceMap[date], c = chipMap[date];
    const prevDate = allDates[allDates.indexOf(date)-1];
    const prevClose = prevDate ? priceMap[prevDate]?.close : null;
    const chg = p && prevClose ? (p.close - prevClose).toFixed(2) : '—';
    const chgCls = chg !== '—' ? (chg >= 0 ? 'pos' : 'neg') : '';
    const topF  = c?.top_foreign?.[0];
    const topFS = c?.top_foreign_sellers?.[0];
    const cv = cumMap[date], ca = cumBuyAvgMap[date];
    const net2 = c?.foreign_net ?? 0;
    const rowCls = net2 > 0 ? 'row-buy' : net2 < 0 ? 'row-sell' : '';
    const icon = superBuy(net2) ? ' 🔥' : superSell(net2) ? ' 💧' : '';
    return `<tr class="${rowCls}">
      <td>${date}${icon}</td>
      <td>${p?.close ?? '—'}</td>
      <td class="${chgCls}">${chg !== '—' ? (chg >= 0 ? '+' : '') + chg : '—'}</td>
      <td class="${c ? (c.foreign_net >= 0 ? 'pos' : 'neg') : ''}">${c ? (c.foreign_net >= 0 ? '+' : '') + c.foreign_net : '—'}</td>
      <td class="${cv != null ? (cv >= 0 ? 'pos' : 'neg') : ''}">${cv != null ? (cv >= 0 ? '+' : '') + cv : '—'}</td>
      <td>${c?.foreign_buy_avg || '—'}</td>
      <td style="color:#f59e0b;font-weight:600">${ca ?? '—'}</td>
      <td style="font-size:11px;color:rgba(239,68,68,0.85)">${topF  ? `${topF.name} +${topF.net}張`  : '—'}</td>
      <td style="font-size:11px;color:rgba(34,197,94,0.65)">${topFS ? `${topFS.name} ${topFS.net}張` : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('mobileCards').innerHTML = rows.map(date => {
    const p = priceMap[date], c = chipMap[date];
    const prevDate = allDates[allDates.indexOf(date)-1];
    const prevClose = prevDate ? priceMap[prevDate]?.close : null;
    const chg = p && prevClose ? (p.close - prevClose).toFixed(2) : null;
    const chgCls = chg !== null ? (chg >= 0 ? 'up' : 'down') : '';
    const net  = c?.foreign_net;
    const top3 = c?.top_foreign?.slice(0,3).map(f => `${f.name} +${f.net}張`).join('　') || '—';
    const topSell = c?.top_foreign_sellers?.[0];
    const topSellStr = topSell ? `${topSell.name} ${topSell.net}張` : '—';
    const domCls  = net > 0 ? 'buy-dom' : net < 0 ? 'sell-dom' : '';
    const mIcon   = superBuy(net) ? ' 🔥' : superSell(net) ? ' 💧' : '';
    return `<div class="mcard ${domCls}">
      <div class="mcard-top">
        <div class="mcard-date">${date}${mIcon}</div>
        <div class="mcard-price">
          <div class="mcard-close">${p?.close ?? '—'}</div>
          <div class="mcard-chg ${chgCls}">${chg !== null ? (chg >= 0 ? '+' : '') + chg : '—'}</div>
        </div>
      </div>
      <div class="mcard-body">
        <div class="mcard-stat">
          <div class="slabel">當日淨買(張)</div>
          <div class="sval ${net != null ? (net >= 0 ? 'up' : 'down') : ''}">${net != null ? (net >= 0 ? '+' : '') + net : '—'}</div>
        </div>
        <div class="mcard-stat">
          <div class="slabel">累計淨買(張)</div>
          <div class="sval ${cumMap[date] >= 0 ? 'up' : 'down'}">${cumMap[date] >= 0 ? '+' : ''}${cumMap[date] ?? '—'}</div>
        </div>
        <div class="mcard-stat">
          <div class="slabel">當日買均價</div>
          <div class="sval">${c?.foreign_buy_avg || '—'}</div>
        </div>
        <div class="mcard-stat">
          <div class="slabel">累計買均價</div>
          <div class="sval" style="color:#f59e0b">${cumBuyAvgMap[date] ?? '—'}</div>
        </div>
      </div>
      <div class="mcard-broker" style="color:rgba(239,68,68,0.8)">買超：${top3}</div>
      <div class="mcard-broker" style="color:rgba(34,197,94,0.6)">賣超：${topSellStr}</div>
    </div>`;
  }).join('');
}

window.onload = () => {
  const params = new URLSearchParams(location.search);
  const qs = params.get('stock');
  if (qs) {
    // 先載入 index 建側欄，再直接顯示指定股票
    loadIndex(qs);
  } else {
    loadIndex();
  }
};
</script>
</body>
</html>

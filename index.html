<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外資籌碼追蹤</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:     #080d16;
    --bg2:    #0f1520;
    --bg3:    #17202e;
    --bg4:    #1e2a3a;
    --border: #1f2d40;
    --accent: #6366f1;
    --buy:    #f43f5e;
    --sell:   #38bdf8;
    --amber:  #f59e0b;
    --text:   #dde5f0;
    --text2:  #8899aa;
    --text3:  #4e6070;
    --sidebar: 190px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

  /* ── Header ── */
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  header h1 { font-size: 14px; font-weight: 700; white-space: nowrap; letter-spacing: .3px; }
  .search { display: flex; gap: 6px; align-items: center; }
  .search input[type=text] { padding: 5px 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; width: 76px; }
  .search input[type=text]:focus { outline: none; border-color: var(--accent); }
  .search button { padding: 5px 12px; border-radius: 7px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }

  /* ── Tab nav ── */
  .tab-nav { display: flex; gap: 3px; margin-left: auto; }
  .tab-btn { padding: 5px 14px; border-radius: 7px; font-size: .78rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--text2); transition: all .15s; letter-spacing: .2px; }
  .tab-btn:hover { background: var(--bg4); color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: rgba(99,102,241,.4); }

  /* ── Page body: wraps chip-view + scan-view ── */
  .page-body { display: flex; flex: 1; overflow: hidden; }

  /* ── Chip view ── */
  #chip-view { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar { width: var(--sidebar); background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .sidebar-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; padding: 14px 14px 8px; }
  .stock-item { padding: 9px 14px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; }
  .stock-item:hover { background: var(--bg3); }
  .stock-item.active { border-left-color: var(--accent); background: rgba(99,102,241,.08); }
  .stock-item .sid { font-size: 13px; font-weight: 700; }
  .stock-item .sname { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .stock-item.active .sid { color: var(--accent); }
  @media (max-width: 640px) { .sidebar { width: 100%; position: fixed; top: 0; left: 0; height: 100%; z-index: 50; transform: translateX(-100%); transition: transform .25s; } .sidebar.open { transform: translateX(0); } }

  /* ── Main chip content ── */
  .main { flex: 1; overflow-y: auto; padding: 14px 16px; }
  @media (max-width: 640px) { .main { padding: 10px 12px; } }

  /* ── Summary cards ── */
  .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
  @media (max-width: 700px) { .summary-cards { grid-template-columns: repeat(2, 1fr); } }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; }
  .card .label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
  .card .value { font-size: 20px; font-weight: 700; }
  .card .sub   { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .up { color: var(--buy); } .down { color: var(--sell); }

  /* ── Date bar ── */
  .date-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 13px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .date-bar label { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .date-bar input[type=date] { padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 12px; color-scheme: dark; }
  .date-bar input[type=date]:focus { outline: none; border-color: var(--accent); }
  .presets { display: flex; gap: 4px; flex-wrap: wrap; }
  .preset-btn { padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .preset-btn:hover, .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .apply-btn { padding: 4px 11px; border-radius: 6px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .sep { color: var(--border); }

  /* ── Chart ── */
  .chart-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; margin-bottom: 12px; }
  .chart-box h2 { font-size: 10px; font-weight: 600; color: var(--text3); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .06em; }
  .chart-wrap { position: relative; height: 260px; }
  @media (max-width: 640px) { .chart-wrap { height: 190px; } }

  /* ── Desktop table ── */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 30px; }
  table { width: 100%; border-collapse: collapse; background: var(--bg2); min-width: 600px; }
  thead { background: var(--bg3); position: sticky; top: 0; z-index: 1; }
  th, td { padding: 7px 12px; text-align: right; font-size: 12px; border-bottom: 1px solid var(--border); }
  th { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  th:first-child, td:first-child { text-align: left; }
  tbody tr:hover { background: var(--bg3); }
  .pos { color: var(--buy); font-weight: 600; }
  .neg { color: var(--sell); font-weight: 600; }
  tbody tr.row-buy  { background: rgba(244,63,94,0.06);  box-shadow: inset 3px 0 0 rgba(244,63,94,0.55); }
  tbody tr.row-buy:hover  { background: rgba(244,63,94,0.11); }
  tbody tr.row-sell { background: rgba(56,189,248,0.04); box-shadow: inset 3px 0 0 rgba(56,189,248,0.3); }
  tbody tr.row-sell:hover { background: rgba(56,189,248,0.08); }
  @media (max-width: 640px) { .table-wrap { display: none; } }

  /* ── Mobile cards ── */
  .mobile-cards { display: none; margin-bottom: 30px; }
  @media (max-width: 640px) { .mobile-cards { display: flex; flex-direction: column; gap: 8px; } }
  .mcard { background: var(--bg2); border: 1px solid var(--border); border-left-width: 3px; border-radius: 10px; padding: 12px 14px; }
  .mcard.buy-dom  { border-left-color: rgba(244,63,94,0.7);  background: rgba(244,63,94,0.05); }
  .mcard.sell-dom { border-left-color: rgba(56,189,248,0.4); background: rgba(56,189,248,0.04); }
  .mcard-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .mcard-date { font-size: 13px; font-weight: 600; }
  .mcard-price { text-align: right; }
  .mcard-close { font-size: 16px; font-weight: 700; }
  .mcard-chg { font-size: 12px; margin-top: 1px; }
  .mcard-body { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .mcard-stat { background: var(--bg3); border-radius: 7px; padding: 7px 10px; }
  .mcard-stat .slabel { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
  .mcard-stat .sval { font-size: 14px; font-weight: 600; }
  .mcard-broker { margin-top: 8px; font-size: 11px; color: var(--text3); border-top: 1px solid var(--border); padding-top: 7px; }

  /* ── Mobile menu btn ── */
  .menu-btn { display: none; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; padding: 0 4px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 49; }
  @media (max-width: 640px) { .menu-btn { display: block; } .overlay.show { display: block; } }

  /* ── Broker ranking ── */
  .rank-toggle-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); font-size: 11px; padding: 4px 10px; cursor: pointer; margin-bottom: 8px; }
  .rank-toggle-btn:hover { color: var(--text2); border-color: var(--text3); }
  .rank-box { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .rank-box.open { display: grid; }
  @media (max-width: 640px) { .rank-box.open { grid-template-columns: 1fr; } }
  .rank-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .rank-panel h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .rank-panel.buy-panel h3  { color: rgba(244,63,94,0.85); }
  .rank-panel.sell-panel h3 { color: rgba(56,189,248,0.7); }
  .rank-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(31,45,64,0.8); font-size: 12px; }
  .rank-row:last-child { border-bottom: none; }
  .rank-no { font-size: 10px; color: var(--text3); width: 14px; flex-shrink: 0; }
  .rank-name { flex: 1; color: var(--text2); }
  .rank-buy  { color: rgba(244,63,94,0.85); font-weight: 600; text-align: right; }
  .rank-sell { color: rgba(56,189,248,0.75); font-weight: 600; text-align: right; }
  .rank-detail-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 11px; }
  .rank-detail-date { color: var(--text3); width: 40px; flex-shrink: 0; }

  #status { text-align: center; color: var(--text3); padding: 60px 20px; line-height: 1.8; }
  #status code { background: var(--bg3); padding: 2px 8px; border-radius: 4px; font-size: 12px; color: var(--text2); }

  /* ── Scan view ── */
  #scan-view { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 14px 16px; }
  .scan-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-shrink: 0; }
  .scan-toolbar select { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; font-size: .82rem; cursor: pointer; }
  .scan-range { font-size: .75rem; color: var(--text3); }
  .scan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px) { .scan-grid { grid-template-columns: 1fr; } }
  .scan-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .scan-card-hd { padding: 9px 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; font-size: .85rem; font-weight: 600; background: var(--bg3); }
  .scan-card-hd .badge { margin-left: auto; font-size: .7rem; background: var(--bg4); padding: 2px 8px; border-radius: 20px; color: var(--text2); }
  .scan-tbl-wrap { overflow-x: auto; }
  .scan-tbl { width: 100%; border-collapse: collapse; font-size: .78rem; }
  .scan-tbl th { padding: 6px 10px; text-align: left; color: var(--text3); font-weight: 500; font-size: .69rem; border-bottom: 1px solid var(--border); background: var(--bg2); white-space: nowrap; }
  .scan-tbl td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .scan-tbl tr:last-child td { border-bottom: none; }
  .scan-tbl tr:hover td { background: var(--bg3); }
  .scan-tbl .more-rows { display: none; }
  .scan-tbl a { color: #a5b4fc; text-decoration: none; font-weight: 600; white-space: nowrap; }
  .scan-tbl a:hover { color: #c7d2fe; }
  .tag-up { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: .68rem; font-weight: 700; background: rgba(245,158,11,.15); color: #fbbf24; }
  .scan-pos { color: #fbbf24; font-weight: 600; }
  .scan-neg { color: #fb7185; font-weight: 600; }
  .scan-muted { color: var(--text3); font-size: .72rem; white-space: nowrap; }
  .scan-empty { padding: 20px; text-align: center; color: var(--text3); font-size: .82rem; }
  .scan-more-btn { display: block; width: 100%; padding: 7px; text-align: center; font-size: .75rem; color: var(--text3); background: none; border: none; border-top: 1px solid var(--border); cursor: pointer; transition: background .15s, color .15s; }
  .scan-more-btn:hover { background: var(--bg3); color: var(--text2); }
  /* ── RWD ── */
  @media (max-width: 480px) {
    header h1 { display: none; }
    .tab-btn { padding: 5px 10px; font-size: .73rem; }
    .scan-grid { gap: 8px; }
    .scan-card-hd { font-size: .8rem; }
  }
</style>
</head>
<body>
<header>
  <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
  <h1>📊 籌碼工具</h1>
  <div class="tab-nav">
    <button class="tab-btn active" id="tab-chip" onclick="switchTab('chip')">個股追蹤</button>
    <button class="tab-btn" id="tab-scan" onclick="switchTab('scan')">日報掃描</button>
  </div>
</header>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="page-body">
<div id="chip-view" class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">持股清單</div>
    <div id="stockList"></div>
  </div>
  <div class="main">
    <div id="status">載入中...</div>
    <div id="content" style="display:none">
      <div class="summary-cards">
        <div class="card"><div class="label">股票</div><div class="value" id="s-stock">—</div><div class="sub" id="s-range">—</div></div>
        <div class="card"><div class="label">最新收盤</div><div class="value" id="s-close">—</div><div class="sub" id="s-chg">—</div></div>
        <div class="card"><div class="label">期間外資累計淨買</div><div class="value" id="s-net">—</div><div class="sub">張</div></div>
        <div class="card"><div class="label">外資累計買均價</div><div class="value" id="s-avg">—</div><div class="sub">元 (VWAP)</div></div>
      </div>

      <div class="date-bar">
        <div class="presets">
          <button class="preset-btn" onclick="applyPreset(5,this)">近5日</button>
          <button class="preset-btn" onclick="applyPreset(10,this)">近10日</button>
          <button class="preset-btn" onclick="applyPreset(20,this)">近20日</button>
          <button class="preset-btn active" onclick="applyPreset(0,this)">全部</button>
        </div>
        <span class="sep">|</span>
        <label>從</label>
        <input type="date" id="dateFrom">
        <label>到</label>
        <input type="date" id="dateTo">
        <button class="apply-btn" onclick="applyDateRange()">套用</button>
      </div>

      <button class="rank-toggle-btn" id="rankToggle" onclick="toggleRank()">▶ 期間外資淨買賣排行</button>
      <div class="rank-box" id="rankBox">
        <div class="rank-panel buy-panel">
          <h3>買超前三（淨張）</h3>
          <div id="rankBuy"></div>
        </div>
        <div class="rank-panel sell-panel">
          <h3>賣超前三（淨張）</h3>
          <div id="rankSell"></div>
        </div>
      </div>

      <div class="chart-box">
        <h2>外資每日淨買張（柱）＋ 股價 & 累計買均價（線）</h2>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>日期</th><th>收盤</th><th>漲跌</th><th>當日淨買(張)</th><th>累計淨買(張)</th><th>當日買均價</th><th>累計買均價</th><th>最大買外資</th><th>最大賣外資</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="mobile-cards" id="mobileCards"></div>
    </div>
  </div>
</div>

<!-- ── 日報掃描 view ── -->
<div id="scan-view">
  <div class="scan-toolbar">
    <select id="scan-date-sel" onchange="loadScanReport(this.value)"></select>
    <span class="scan-range" id="scan-range"></span>
  </div>
  <div id="scan-loading" style="text-align:center;color:var(--text3);padding:40px">載入中...</div>
  <div id="scan-content" style="display:none">
    <div class="scan-grid">
      <div class="scan-card">
        <div class="scan-card-hd">🔍 外資連續買超<span class="badge" id="sc-inst">0</span></div>
        <div class="scan-tbl-wrap" id="sb-inst"></div>
      </div>
      <div class="scan-card">
        <div class="scan-card-hd">📈 量增低翻強<span class="badge" id="sc-rec">0</span></div>
        <div class="scan-tbl-wrap" id="sb-rec"></div>
      </div>
      <div class="scan-card">
        <div class="scan-card-hd">🕯️ 穩量緩漲<span class="badge" id="sc-steady">0</span></div>
        <div class="scan-tbl-wrap" id="sb-steady"></div>
      </div>
      <div class="scan-card">
        <div class="scan-card-hd">💥 盤整突破<span class="badge" id="sc-break">0</span></div>
        <div class="scan-tbl-wrap" id="sb-break"></div>
      </div>
    </div>
  </div>
</div>
</div><!-- /.page-body -->

<script>
let chart = null;
let fullData = null;
let currentId = null;
let stockNameMap = {};

// ── Sidebar ──
function toggleRank() {
  const box = document.getElementById('rankBox');
  const btn = document.getElementById('rankToggle');
  const open = box.classList.toggle('open');
  btn.textContent = (open ? '▼' : '▶') + ' 期間外資淨買賣排行';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

async function loadIndex(preferStock) {
  try {
    const res = await fetch(`data/index.json?t=${Date.now()}`);
    if (!res.ok) return;
    const idx = await res.json();
    idx.stocks.forEach(s => stockNameMap[s.id] = s.name);
    const list = document.getElementById('stockList');
    list.innerHTML = idx.stocks.map(s =>
      `<div class="stock-item" id="si-${s.id}" onclick="loadStock('${s.id}')">
        <div class="sid">${s.id}</div>
        <div class="sname">${s.name}</div>
      </div>`
    ).join('');
    // 優先載入 query string 指定的股票，否則第一支
    const target = preferStock || (idx.stocks[0]?.id);
    if (target) loadStock(target);
  } catch(e) { /* index.json 不存在也 ok */ }
}

function setActiveSidebarItem(id) {
  document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`si-${id}`);
  if (el) el.classList.add('active');
}

// ── Load stock ──
async function loadStock(sid) {
  sid = (sid || '').trim();
  if (!sid) return;
  currentId = sid;
  setActiveSidebarItem(sid);
  const _p = new URLSearchParams(location.search);
  _p.set('stock', sid);
  history.replaceState(null, '', '?' + _p.toString());
  // 手機關閉 sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');

  const statusEl = document.getElementById('status');
  statusEl.style.display = 'block';
  statusEl.innerHTML = '載入中...';
  document.getElementById('content').style.display = 'none';
  try {
    const res = await fetch(`data/${sid}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`找不到 data/${sid}.json<br>請執行：<code>node fetch_chip.js ${sid}</code>`);
    fullData = await res.json();
    const allDates = getAllDates(fullData);
    document.getElementById('dateFrom').value = allDates[0];
    document.getElementById('dateTo').value   = allDates[allDates.length - 1];
    document.getElementById('dateTo').max     = allDates[allDates.length - 1];
    document.getElementById('dateFrom').min   = allDates[0];
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.preset-btn:last-of-type').classList.add('active');
    renderView(allDates[0], allDates[allDates.length - 1]);
    statusEl.style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    statusEl.innerHTML = e.message;
  }
}

function getAllDates(data) {
  return [...new Set([...data.prices.map(p=>p.date), ...data.chips.map(c=>c.date)])].sort();
}

function setActivePreset(btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function applyPreset(n, btn) {
  setActivePreset(btn);
  const allDates = getAllDates(fullData);
  const filtered = n > 0 ? allDates.slice(-n) : allDates;
  document.getElementById('dateFrom').value = filtered[0];
  document.getElementById('dateTo').value   = filtered[filtered.length - 1];
  renderView(filtered[0], filtered[filtered.length - 1]);
}

function applyDateRange() {
  setActivePreset(null);
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  if (from && to) renderView(from, to);
}

function renderView(fromDate, toDate) {
  const { stockId, prices, chips } = fullData;

  const priceMap = {}, chipMap = {};
  prices.forEach(p => priceMap[p.date] = p);
  chips.forEach(c  => chipMap[c.date]  = c);

  const allDates = getAllDates(fullData);
  const dates = allDates.filter(d => d >= fromDate && d <= toDate);
  if (!dates.length) return;

  // ── Summary cards ──
  const stockName = stockNameMap[stockId] || '';
  document.getElementById('s-stock').textContent = stockName ? `${stockId} ${stockName}` : stockId;
  document.title = stockName ? `${stockId} ${stockName} | 外資籌碼` : `${stockId} | 外資籌碼`;
  document.getElementById('s-range').textContent = `${dates[0]} ～ ${dates[dates.length-1]}`;

  const lastPrice = [...dates].reverse().map(d => priceMap[d]).find(Boolean);
  const prevPrice = lastPrice ? (() => {
    const idx = allDates.indexOf(lastPrice.date);
    return idx > 0 ? priceMap[allDates[idx-1]] : null;
  })() : null;
  document.getElementById('s-close').textContent = lastPrice?.close ?? '—';
  if (lastPrice && prevPrice) {
    const chg = (lastPrice.close - prevPrice.close).toFixed(2);
    const pct = ((lastPrice.close - prevPrice.close) / prevPrice.close * 100).toFixed(2);
    const el = document.getElementById('s-chg');
    el.textContent = `${chg >= 0 ? '+' : ''}${chg} (${pct}%)`;
    el.className = 'sub ' + (chg >= 0 ? 'up' : 'down');
  }

  const filteredChips = dates.map(d => chipMap[d]).filter(Boolean);
  const totalNet = filteredChips.reduce((s, c) => s + c.foreign_net, 0);
  document.getElementById('s-net').textContent = (totalNet >= 0 ? '+' : '') + totalNet;
  document.getElementById('s-net').className = 'value ' + (totalNet >= 0 ? 'up' : 'down');

  let totalBuyAmt = 0, totalBuyVol = 0;
  filteredChips.forEach(c => { totalBuyAmt += c.foreign_buy_avg * c.foreign_buy * 1000; totalBuyVol += c.foreign_buy * 1000; });
  document.getElementById('s-avg').textContent = totalBuyVol ? (totalBuyAmt / totalBuyVol).toFixed(2) : '—';

  // ── Chart data ──
  const closeArr  = dates.map(d => priceMap[d]?.close ?? null);
  const netArr    = dates.map(d => chipMap[d]?.foreign_net ?? null);
  let cum = 0;
  const cumArr = dates.map(d => { cum += chipMap[d]?.foreign_net ?? 0; return cum; });
  let cba = 0, cbv = 0;
  const cumBuyAvgArr = dates.map(d => {
    const c = chipMap[d];
    if (c && c.foreign_buy > 0) { cba += c.foreign_buy_avg * c.foreign_buy; cbv += c.foreign_buy; }
    return cbv > 0 ? +(cba / cbv).toFixed(2) : null;
  });

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mainChart'), {
    data: {
      labels: dates,
      datasets: [
        { type:'bar', label:'當日淨買(張)', data:netArr,
          backgroundColor: netArr.map(v => v >= 0 ? 'rgba(239,68,68,0.7)' : 'rgba(34,197,94,0.7)'),
          yAxisID:'yNet', order:2 },
        { type:'line', label:'累計淨買(張)', data:cumArr,
          borderColor:'#a78bfa', backgroundColor:'transparent',
          borderWidth:1.5, borderDash:[3,3], pointRadius:0, yAxisID:'yNet', order:3, tension:0.1 },
        { type:'line', label:'收盤價', data:closeArr,
          borderColor:'#4f7fff', backgroundColor:'transparent',
          borderWidth:2.5, pointRadius:3, yAxisID:'yPrice', order:1, tension:0.1 },
        { type:'line', label:'累計買均價', data:cumBuyAvgArr,
          borderColor:'#f59e0b', backgroundColor:'transparent',
          borderWidth:2, borderDash:[5,4], pointRadius:2, yAxisID:'yPrice', order:0, tension:0.1 },
      ],
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        tooltip:{
          backgroundColor:'rgba(26,29,39,0.95)', borderColor:'#2e3347', borderWidth:1,
          callbacks:{
            afterBody(ctx) {
              const date = ctx[0]?.label;
              const c = chipMap[date];
              if (!c?.top_foreign?.length && !c?.top_foreign_sellers?.length) return [];
              const lines = [];
              if (c.top_foreign?.length) {
                lines.push('','── 買超外資 ──');
                c.top_foreign.slice(0,3).forEach(f => lines.push(`${f.name}  +${f.net}張  均${f.buy_avg}`));
              }
              if (c.top_foreign_sellers?.length) {
                lines.push('','── 賣超外資 ──');
                c.top_foreign_sellers.slice(0,3).forEach(f => lines.push(`${f.name}  ${f.net}張  均${f.sell_avg}`));
              }
              return lines;
            }
          }
        },
        legend:{ position:'top', labels:{ color:'#94a3b8', boxWidth:14 } },
      },
      scales:{
        yNet:  { position:'left',  title:{display:true,text:'淨買張數',color:'#64748b'}, grid:{color:'rgba(46,51,71,0.8)'}, ticks:{color:'#64748b'} },
        yPrice:{ position:'right', title:{display:true,text:'價格(元)',color:'#64748b'}, grid:{drawOnChartArea:false}, ticks:{color:'#64748b'} },
        x:     { ticks:{color:'#64748b',maxRotation:45}, grid:{color:'rgba(46,51,71,0.5)'} },
      },
    },
  });

  // ── Table & cards ──
  // ── 跨日外資分點買賣加總排行 ──
  const brokerTotals = {};
  const brokerDailyMap = {};   // name → [{date, net}]
  for (const d of dates) {
    const c = chipMap[d];
    if (!c) continue;
    for (const f of [...(c.top_foreign || []), ...(c.top_foreign_sellers || [])]) {
      if (!brokerTotals[f.name]) brokerTotals[f.name] = { buy: 0, sell: 0 };
      brokerTotals[f.name].buy  += f.buy  || 0;
      brokerTotals[f.name].sell += f.sell || 0;
      if (!brokerDailyMap[f.name]) brokerDailyMap[f.name] = [];
      brokerDailyMap[f.name].push({ date: d, net: f.net });
    }
  }
  const brokerArr = Object.entries(brokerTotals).map(([name, v]) => ({
    name, net: v.buy - v.sell,
  }));
  const top3Buy  = [...brokerArr].sort((a,b) => b.net - a.net).filter(r => r.net > 0).slice(0, 3);
  const top3Sell = [...brokerArr].sort((a,b) => a.net - b.net).filter(r => r.net < 0).slice(0, 3);

  // 警示：買超券商近3日是否轉賣
  const recentDates = dates.slice(-3);
  function turnAlert(name) {
    const days = brokerDailyMap[name] || [];
    const recentNets = recentDates.map(d => {
      const e = days.find(x => x.date === d);
      return e ? e.net : null;
    }).filter(n => n !== null);
    if (!recentNets.length) return '';
    const sellDays = recentNets.filter(n => n < 0).length;
    if (sellDays >= 2) return '⚠️';        // 近3日多數轉賣
    if (sellDays === 1 && recentNets.at(-1) < 0) return '🔄';  // 最近一日轉賣
    return '';
  }

  // 近期逐日明細 HTML
  function dailyDetail(name, highlightCls) {
    const days = (brokerDailyMap[name] || []).slice(-7);
    if (!days.length) return '<div style="color:var(--text3);font-size:11px;padding:4px 0 2px">無資料</div>';
    return days.map(({date, net}) => {
      const icon = net > 0 ? '🔴' : net < 0 ? '🟢' : '➡️';
      const cls  = net > 0 ? 'rank-buy' : net < 0 ? 'rank-sell' : '';
      return `<div class="rank-detail-row">
        <span class="rank-detail-date">${date.slice(5)}</span>
        <span>${icon}</span>
        <span class="${cls}" style="min-width:52px;text-align:right">${net >= 0 ? '+' : ''}${net.toLocaleString()}張</span>
      </div>`;
    }).join('');
  }

  window.toggleDetail = function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    const btn = document.getElementById('btn-' + id);
    if (btn) btn.textContent = open ? '▶' : '▼';
  };

  function rankRow(r, i, cls, showAlert) {
    const alert = showAlert ? turnAlert(r.name) : '';
    const uid = 'rd-' + r.name.replace(/\s/g,'_') + '-' + i;
    return `
    <div class="rank-row" style="flex-wrap:wrap">
      <span class="rank-no">${i+1}</span>
      <span class="rank-name">${r.name}${alert ? ' <span title="近期轉向警示">' + alert + '</span>' : ''}</span>
      <span class="${cls}" style="margin-right:4px">${r.net >= 0 ? '+' : ''}${r.net.toLocaleString()}張</span>
      <button id="btn-${uid}" onclick="toggleDetail('${uid}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;padding:0 2px">▶</button>
      <div id="${uid}" style="display:none;width:100%;padding:4px 0 2px 22px">${dailyDetail(r.name, cls)}</div>
    </div>`;
  }

  document.getElementById('rankBuy').innerHTML  = top3Buy.map((r,i)  => rankRow(r,i,'rank-buy', true)).join('')  || '<div style="color:var(--text3);font-size:12px;padding:6px 0">無買超資料</div>';
  document.getElementById('rankSell').innerHTML = top3Sell.map((r,i) => rankRow(r,i,'rank-sell',false)).join('') || '<div style="color:var(--text3);font-size:12px;padding:6px 0">無賣超資料</div>';

  // Super dominant 閾值：淨買絕對值前 20%
  const netVals  = dates.map(d => chipMap[d]?.foreign_net ?? 0);
  const sorted20 = [...netVals].map(Math.abs).filter(v=>v>0).sort((a,b)=>b-a);
  const threshold = sorted20[Math.floor(sorted20.length * 0.2)] ?? Infinity;
  const superBuy  = v => v > 0 && v >= threshold;
  const superSell = v => v < 0 && Math.abs(v) >= threshold;

  const cumMap = {}, cumBuyAvgMap = {};
  let rs = 0, rba = 0, rbv = 0;
  dates.forEach(d => {
    rs += chipMap[d]?.foreign_net ?? 0; cumMap[d] = rs;
    const c = chipMap[d];
    if (c && c.foreign_buy > 0) { rba += c.foreign_buy_avg * c.foreign_buy; rbv += c.foreign_buy; }
    cumBuyAvgMap[d] = rbv > 0 ? (rba / rbv).toFixed(2) : null;
  });

  const rows = [...dates].reverse();

  document.getElementById('tableBody').innerHTML = rows.map(date => {
    const p = priceMap[date], c = chipMap[date];
    const prevDate = allDates[allDates.indexOf(date)-1];
    const prevClose = prevDate ? priceMap[prevDate]?.close : null;
    const chg = p && prevClose ? (p.close - prevClose).toFixed(2) : '—';
    const chgCls = chg !== '—' ? (chg >= 0 ? 'pos' : 'neg') : '';
    const topF  = c?.top_foreign?.[0];
    const topFS = c?.top_foreign_sellers?.[0];
    const cv = cumMap[date], ca = cumBuyAvgMap[date];
    const net2 = c?.foreign_net ?? 0;
    const rowCls = net2 > 0 ? 'row-buy' : net2 < 0 ? 'row-sell' : '';
    const icon = superBuy(net2) ? ' 🔥' : superSell(net2) ? ' 💧' : '';
    return `<tr class="${rowCls}">
      <td>${date}${icon}</td>
      <td>${p?.close ?? '—'}</td>
      <td class="${chgCls}">${chg !== '—' ? (chg >= 0 ? '+' : '') + chg : '—'}</td>
      <td class="${c ? (c.foreign_net >= 0 ? 'pos' : 'neg') : ''}">${c ? (c.foreign_net >= 0 ? '+' : '') + c.foreign_net : '—'}</td>
      <td class="${cv != null ? (cv >= 0 ? 'pos' : 'neg') : ''}">${cv != null ? (cv >= 0 ? '+' : '') + cv : '—'}</td>
      <td>${c?.foreign_buy_avg || '—'}</td>
      <td style="color:#f59e0b;font-weight:600">${ca ?? '—'}</td>
      <td style="font-size:11px;color:rgba(239,68,68,0.85)">${topF  ? `${topF.name} +${topF.net}張`  : '—'}</td>
      <td style="font-size:11px;color:rgba(34,197,94,0.65)">${topFS ? `${topFS.name} ${topFS.net}張` : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('mobileCards').innerHTML = rows.map(date => {
    const p = priceMap[date], c = chipMap[date];
    const prevDate = allDates[allDates.indexOf(date)-1];
    const prevClose = prevDate ? priceMap[prevDate]?.close : null;
    const chg = p && prevClose ? (p.close - prevClose).toFixed(2) : null;
    const chgCls = chg !== null ? (chg >= 0 ? 'up' : 'down') : '';
    const net  = c?.foreign_net;
    const top3 = c?.top_foreign?.slice(0,3).map(f => `${f.name} +${f.net}張`).join('　') || '—';
    const topSell = c?.top_foreign_sellers?.[0];
    const topSellStr = topSell ? `${topSell.name} ${topSell.net}張` : '—';
    const domCls  = net > 0 ? 'buy-dom' : net < 0 ? 'sell-dom' : '';
    const mIcon   = superBuy(net) ? ' 🔥' : superSell(net) ? ' 💧' : '';
    return `<div class="mcard ${domCls}">
      <div class="mcard-top">
        <div class="mcard-date">${date}${mIcon}</div>
        <div class="mcard-price">
          <div class="mcard-close">${p?.close ?? '—'}</div>
          <div class="mcard-chg ${chgCls}">${chg !== null ? (chg >= 0 ? '+' : '') + chg : '—'}</div>
        </div>
      </div>
      <div class="mcard-body">
        <div class="mcard-stat">
          <div class="slabel">當日淨買(張)</div>
          <div class="sval ${net != null ? (net >= 0 ? 'up' : 'down') : ''}">${net != null ? (net >= 0 ? '+' : '') + net : '—'}</div>
        </div>
        <div class="mcard-stat">
          <div class="slabel">累計淨買(張)</div>
          <div class="sval ${cumMap[date] >= 0 ? 'up' : 'down'}">${cumMap[date] >= 0 ? '+' : ''}${cumMap[date] ?? '—'}</div>
        </div>
        <div class="mcard-stat">
          <div class="slabel">當日買均價</div>
          <div class="sval">${c?.foreign_buy_avg || '—'}</div>
        </div>
        <div class="mcard-stat">
          <div class="slabel">累計買均價</div>
          <div class="sval" style="color:#f59e0b">${cumBuyAvgMap[date] ?? '—'}</div>
        </div>
      </div>
      <div class="mcard-broker" style="color:rgba(239,68,68,0.8)">買超：${top3}</div>
      <div class="mcard-broker" style="color:rgba(34,197,94,0.6)">賣超：${topSellStr}</div>
    </div>`;
  }).join('');
}

window.onload = () => {
  const params = new URLSearchParams(location.search);
  const qs  = params.get('stock');
  const tab = params.get('tab');
  if (tab === 'scan') {
    switchTab('scan');
  }
  loadIndex(qs || undefined);
};

// ── Tab 切換 ────────────────────────────────────────────────
function switchTab(tab) {
  const isChip = tab === 'chip';
  document.getElementById('tab-chip').classList.toggle('active', isChip);
  document.getElementById('tab-scan').classList.toggle('active', !isChip);
  document.getElementById('chip-view').style.display    = isChip ? 'flex' : 'none';
  document.getElementById('scan-view').style.display    = isChip ? 'none' : 'flex';
  document.getElementById('menuBtn').style.display      = isChip ? '' : 'none';
  const params = new URLSearchParams(location.search);
  params.set('tab', tab);
  history.replaceState(null, '', '?' + params.toString());
  if (!isChip && !document.getElementById('scan-date-sel').options.length) initScan();
}

// ── 日報掃描 ─────────────────────────────────────────────────
const yahooUrl = id => `https://tw.stock.yahoo.com/quote/${id}`;
const sLink    = (id, name) => `<a href="${yahooUrl(id)}" target="_blank">${id} ${name}</a>`;
const fmtNet   = n => n >= 0 ? `<span class="scan-pos">+${n.toLocaleString()}</span>` : `<span class="scan-neg">${n.toLocaleString()}</span>`;

const SHOW_LIMIT = 10;

function scanTable(cols, rows) {
  if (!rows.length) return '<div class="scan-empty">無符合條件</div>';
  const head = `<thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>`;
  const top  = rows.slice(0, SHOW_LIMIT).join('');
  const rest = rows.slice(SHOW_LIMIT);
  const moreBody = rest.length ? `<tbody class="more-rows">${rest.join('')}</tbody>` : '';
  const moreBtn  = rest.length
    ? `<button class="scan-more-btn" onclick="toggleMore(this)">展開其餘 ${rest.length} 筆 ▾</button>`
    : '';
  return `<table class="scan-tbl">${head}<tbody>${top}</tbody>${moreBody}</table>${moreBtn}`;
}

function toggleMore(btn) {
  const tbl      = btn.previousElementSibling;          // the <table>
  const moreBody = tbl.querySelector('.more-rows');
  const isHidden = moreBody.style.display !== 'table-row-group';
  moreBody.style.display = isHidden ? 'table-row-group' : 'none';
  const n = moreBody.querySelectorAll('tr').length;
  btn.textContent = isHidden ? `收起 ▴` : `展開其餘 ${n} 筆 ▾`;
}

function renderScanReport(r) {
  document.getElementById('scan-range').textContent = `掃描區間：${r.scanRange}`;
  document.getElementById('sc-inst').textContent   = r.institutional.length;
  document.getElementById('sc-rec').textContent    = r.priceRecovery.length;
  document.getElementById('sc-steady').textContent = r.steadyRise.length;
  document.getElementById('sc-break').textContent  = r.breakout.length;

  document.getElementById('sb-inst').innerHTML = scanTable(
    ['股票','連續','淨買合計','近5日','主力分點'],
    r.institutional.map(c => {
      const nets = c.recentNets.slice(-5).map(n=>`<span class="${n>=0?'scan-pos':'scan-neg'}">${n>=0?'+':''}${n}</span>`).join(' ');
      const b = c.brokers?.length ? `<div class="scan-muted">${c.brokers.slice(0,2).join('、')}</div>` : '';
      return `<tr><td>${sLink(c.id,c.name)}</td><td class="scan-muted">連${c.streak}日</td><td>${fmtNet(c.totalNet)}張</td><td class="scan-muted">${nets}</td><td>${b}</td></tr>`;
    })
  );
  document.getElementById('sb-rec').innerHTML = scanTable(
    ['股票','近5日漲幅','收盤','量比'],
    r.priceRecovery.map(c=>`<tr><td>${sLink(c.id,c.name)}</td><td><span class="tag-up">+${c.gain}%</span></td><td class="scan-muted">${c.latestClose}元</td><td class="scan-muted">×${c.volRatio}</td></tr>`)
  );
  document.getElementById('sb-steady').innerHTML = scanTable(
    ['股票','10日漲幅','上漲天','CV','均量','收盤'],
    r.steadyRise.map(c=>`<tr><td>${sLink(c.id,c.name)}</td><td><span class="tag-up">+${c.gain}%</span></td><td class="scan-muted">${c.upDays}/9</td><td class="scan-muted">${c.cv}</td><td class="scan-muted">${c.avgVolK}張</td><td class="scan-muted">${c.latestClose}元</td></tr>`)
  );
  document.getElementById('sb-break').innerHTML = scanTable(
    ['股票','突破漲幅','量比','CV','收盤'],
    r.breakout.map(c=>`<tr><td>${sLink(c.id,c.name)}</td><td><span class="tag-up">+${c.breakGain}%</span></td><td class="scan-muted">×${c.volSurge}</td><td class="scan-muted">${c.baseCV}</td><td class="scan-muted">${c.latestClose}元</td></tr>`)
  );
  document.getElementById('scan-loading').style.display = 'none';
  document.getElementById('scan-content').style.display = '';
}

async function loadScanReport(date) {
  document.getElementById('scan-loading').style.display = '';
  document.getElementById('scan-content').style.display = 'none';
  const r = await fetch(`data/reports/${date}.json`).then(r=>r.json());
  renderScanReport(r);
}

async function initScan() {
  const dates = await fetch('data/reports/index.json').then(r=>r.json()).catch(()=>[]);
  const sel = document.getElementById('scan-date-sel');
  dates.forEach(d => { const o = document.createElement('option'); o.value = o.textContent = d; sel.appendChild(o); });
  if (dates.length) loadScanReport(dates[0]);
  else { document.getElementById('scan-loading').textContent = '尚無日報，請先執行 scan.js'; }
}
</script>
</body>
</html>
